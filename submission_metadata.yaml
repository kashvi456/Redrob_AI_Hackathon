# ============================================================================
# Approach summary 
# ============================================================================
methodology_summary: |
  Rule-based, fully explainable ranker (no embeddings/LLM calls). A honeypot
  screen first removes candidates with internally inconsistent profiles
  (e.g. summary text years-of-experience contradicting the structured field,
  career-history duration mismatched against stated experience, overlapping
  full-time roles, "expert" skills with zero duration). Remaining candidates
  get a weighted base-fit score across 7 components: title relevance (0.28,
  the primary defense against the keyword-stuffer trap), production evidence
  mined from career-history prose for embeddings/vector-DB/ranking/retrieval/
  eval-framework work (0.27), trust-weighted skills that only count if
  endorsed, used, or corroborated in prose (0.15), experience-years fit as a
  smooth Gaussian centered on 7 years (0.10), location fit favoring Pune/
  Noida per the JD (0.10), education tier (0.05), and tenure stability
  (0.05). JD-specific disqualifiers (pure research background, consulting-
  only career, CV/speech/robotics without NLP/IR, LangChain-only recent AI
  experience, stale senior ICs, title-chasing) apply as multiplicative
  penalties, not hard cuts. A bounded behavioral-signal multiplier
  (open_to_work, activity recency, response rate, notice period, etc.) is
  applied last. All saturating sub-scores use smooth asymptotic curves
  instead of hard caps to preserve score resolution across the top 100.
  Reasoning strings are generated from the same extracted facts used for
  scoring, never templated. Runtime: ~40s / <200MB RAM on the full 100K pool.

